# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploys the FastAPI backend with a managed Postgres and a persistent disk for
# event images. Point Render at this file (New > Blueprint) and it provisions
# both services together.
#
# NOTE: persistent disks require a paid instance type. On a free instance the
# filesystem is ephemeral, and every uploaded image is lost on redeploy or on
# the restart that follows the service going to sleep.

services:
  - type: web
    name: announcement-api
    runtime: python
    plan: starter # disks are unavailable on the free plan
    # This repo holds backend/, admin-web/ and mobile-app/ side by side, so the
    # service has to be scoped to the backend directory.
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Migrations run on every deploy, before the server accepts traffic. Without
    # this, new code meets an old schema and every request touching a new table
    # 500s until someone remembers to migrate by hand.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: announcement-db
          property: connectionString
      # Generated once by Render and then held stable. Changing it invalidates
      # every issued JWT, signing all users out.
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # Absolute, so it resolves to the mounted disk rather than the ephemeral
      # copy of the repo. app/config.py only joins relative paths to the repo.
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_UPLOAD_MB
        value: "15"
      # Browser origins for admin-web. The mobile app does not need an entry:
      # native requests are not subject to CORS.
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.11"

  - type: web
    name: announcement-admin
    runtime: static
    rootDir: admin-web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Set to the API's full URL including https:// — e.g.
      # https://announcement-api.onrender.com — once that service is up.
      # Not wired with fromService because the available properties give a bare
      # host or host:port, and axios needs the scheme.
      #
      # Vite inlines this at build time, so moving the API means rebuilding
      # this site, not just editing the variable.
      - key: VITE_API_URL
        sync: false
    routes:
      # React Router owns the URLs. Without this, loading /events directly (or
      # refreshing it) asks the host for a file that does not exist and 404s.
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: announcement-db
    databaseName: event_checkin
    plan: basic-256mb
