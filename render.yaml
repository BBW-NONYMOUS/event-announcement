# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Free-tier setup. Two pieces deliberately live outside Render, because its
# free tier cannot host them without data loss:
#
#   Postgres  -> Neon (Render's free database is deleted after its trial ends)
#   Images    -> Cloudflare R2 (free instances have no persistent disk, so
#                anything written to the filesystem is lost on every redeploy)
#
# Both are wired in through environment variables set in the dashboard. See
# DEPLOYMENT.md for where to get each value.

services:
  - type: web
    name: announcement-api
    runtime: python
    plan: free
    # This repo holds backend/, admin-web/ and mobile-app/ side by side, so the
    # service has to be scoped to the backend directory.
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Migrations run on every deploy, before the server accepts traffic. Without
    # this, new code meets an old schema and every request touching a new table
    # 500s until someone migrates by hand.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # Neon connection string, including ?sslmode=require.
      - key: DATABASE_URL
        sync: false
      # Generated once by Render and then held stable. Changing it invalidates
      # every issued JWT, signing all users out.
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: MAX_UPLOAD_MB
        value: "15"
      # Browser origins for admin-web. The mobile app needs no entry: native
      # requests are not subject to CORS.
      - key: CORS_ORIGINS
        sync: false
      # Cloudflare R2. All five must be set or the API falls back to the local
      # filesystem, where images survive only until the next deploy.
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.11"

  - type: web
    name: announcement-admin
    runtime: static
    rootDir: admin-web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Set to the API's full URL including https:// — e.g.
      # https://announcement-api.onrender.com — once that service is up.
      # Not wired with fromService because the available properties give a bare
      # host or host:port, and axios needs the scheme.
      #
      # Vite inlines this at build time, so moving the API means rebuilding
      # this site, not just editing the variable.
      - key: VITE_API_URL
        sync: false
    routes:
      # React Router owns the URLs. Without this, loading /events directly (or
      # refreshing it) asks the host for a file that does not exist and 404s.
      - type: rewrite
        source: /*
        destination: /index.html
